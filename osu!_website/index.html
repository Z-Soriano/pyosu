<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>osu! Saved Content</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>osu! Saved Content</h1>

    <p>
      Upload a <code>.osu</code> file. Its contents will be saved in this website as
      <strong>saved content</strong>. Uploading a new file replaces the old saved content.
    </p>

    <input type="file" id="fileInput" accept=".osu">

    <div class="buttons">
      <button id="downloadButton">Download Saved Content</button>
      <button id="clearButton">Clear Saved Content</button>
    </div>

    <section>
      <h2>Saved Content</h2>
      <p id="status">No saved content yet.</p>
      <pre id="output"></pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
